version: '3.3'

services:
  nginx:
    build: ./nginx
    image: evgeniy-khyst/nginx
    env_file:
      - ./config.env
    volumes:
      - nginx_conf:/etc/nginx/sites
      - letsencrypt_certs:/etc/letsencrypt
      - certbot_acme_challenge:/var/www/certbot
      - ./vhosts:/etc/nginx/vhosts
      - static_volume:/backend/static
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped

  # OWASP Coraza WAF (OWASP Core Rule Set) — reverse proxy in front of the app.
  # Request path once enabled:
  #   client --TLS--> nginx --http--> coraza (WAF) --http--> web:8000
  # This service is ADDITIVE: adding it does NOT reroute traffic by itself.
  # To route through the WAF, repoint the server-side vhost proxy_pass from
  # http://web:8000 to http://coraza:8080 (see coraza/README.md).
  coraza:
    image: ghcr.io/coreruleset/coraza-crs:nginx
    restart: unless-stopped
    environment:
      BACKEND: "web:8000"                  # upstream app (host:port, no scheme)
      PORT: "8080"                         # WAF listen port
      CORAZA_RULE_ENGINE: "DetectionOnly"  # log-only; switch to "On" after tuning
      PARANOIA: "1"
      BLOCKING_PARANOIA: "1"
      ANOMALY_INBOUND: "5"
      ANOMALY_OUTBOUND: "4"
      ACCESSLOG: "/dev/stdout"
      ERRORLOG: "/dev/stderr"
      CORAZA_AUDIT_LOG: "/dev/stdout"      # audit log visible via `docker logs`
      LOGLEVEL: "warn"
    volumes:
      # Custom rules & false-positive exclusions, loaded alongside CRS defaults
      - ./coraza/custom-rules.conf:/opt/coraza/rules.d/999-custom-rules.conf:ro
    depends_on:
      - web

  certbot:
    build: ./certbot
    image: evgeniy-khyst/certbot
    env_file:
      - ./config.env
    volumes:
      - letsencrypt_certs:/etc/letsencrypt
      - certbot_acme_challenge:/var/www/certbot

  cron:
    build: ./cron
    image: evgeniy-khyst/cron
    environment:
      COMPOSE_PROJECT_NAME: "${COMPOSE_PROJECT_NAME}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./:/workdir:ro
    restart: unless-stopped
    
  web:
    build: ./backend
    command: gunicorn --bind 0.0.0.0:8000 --workers 16 anudesh_backend.wsgi --timeout 300
    volumes:
      - ./backend/:/usr/src/backend/
      - static_volume:/usr/src/backend/static
    ports:
      - 8000:8000
    depends_on:
      - redis
  redis:
    container_name: redis
    image: "redis"
    ports:
      - 6379:6379
  
  celery:
    container_name: celery-default
    restart: always
    build: ./backend
    command: celery -A anudesh_backend.celery worker -Q default --concurrency=2 --loglevel=info
    volumes:
      - ./backend/:/usr/src/backend/
    depends_on:
      - redis
      - web 

  # This is the additional queue which contains the low-priority celery tasks. We can adjust the concurrency and workers alloted to this container. 
  celery2: 
    container_name: celery-low-priority
    restart: always
    build: ./backend
    command: celery -A anudesh_backend.celery worker -Q functions --concurrency=2 --loglevel=info
    volumes:
      - ./backend/:/usr/src/backend/
    depends_on:
      - redis
      - web

  # Celery beats - for scheduling daily e-mails
  celery-beat:
    build: ./backend
    command: celery -A anudesh_backend.celery beat --loglevel=info
    volumes:
      - ./backend/:/usr/src/backend
    depends_on:
      - redis
      - web
  
  celery3:
    container_name: celery-reports
    restart: always
    build: ./backend
    command: celery -A anudesh_backend.celery worker -Q reports --concurrency=2 --loglevel=info
    volumes:
      - ./backend/:/usr/src/backend/
    depends_on:
      - redis
      - web

  flower:
    container_name: flower
    restart: always
    build: ./backend
    command: celery -A shoonya_backend.celery flower --conf="./usr/src/backend/anudesh_backend/flowerconfig.py" --basic-auth="${FLOWER_USERNAME}:${FLOWER_PASSWORD}"
    ports:
      - "5555:5555"
    volumes:
      - ./backend/:/usr/src/backend/
      - logs_vol:/logs
    depends_on:
      - redis
      - web

volumes:
  nginx_conf:
    external: true
  letsencrypt_certs:
    external: true
  certbot_acme_challenge:
  static_volume:
