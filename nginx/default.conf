server_names_hash_bucket_size 64;

# ---------------------------------------------------------------------------
# Upstream: Gunicorn web backend
#
# keepalive 32  — maintain a pool of 32 idle TCP connections to Gunicorn so
# each new HTTP request reuses an existing socket instead of paying the cost
# of a fresh TCP + TLS handshake on every call.  With 16 Gunicorn workers
# and LLM requests that tie up a worker for several seconds, this pool fills
# quickly; 32 keeps headroom for bursts.
# ---------------------------------------------------------------------------
upstream web_backend {
    server web:8000;

    keepalive          32;
    keepalive_requests 1000;
    keepalive_timeout  60s;
}

include /etc/nginx/includes/gzip.conf;

include /etc/nginx/sites/*.conf;
