gzip on;
gzip_disable "msie6";

gzip_vary on;
gzip_proxied any;

# Level 2 delivers ~85 % of level 6's compression ratio at ~30 % of the
# CPU cost.  On a busy LLM backend, saving CPU beats saving a few bytes.
gzip_comp_level 2;

gzip_buffers 16 8k;
gzip_http_version 1.1;

# Skip gzip for tiny responses where the overhead exceeds any saving.
# 1024 bytes is a safe floor; most LLM JSON responses are much larger.
gzip_min_length 1024;

gzip_types
    application/atom+xml
    application/geo+json
    application/javascript
    application/x-javascript
    application/json
    application/ld+json
    application/manifest+json
    application/rdf+xml
    application/rss+xml
    application/xhtml+xml
    application/xml
    font/eot
    font/otf
    font/ttf
    image/svg+xml
    text/css
    text/javascript
    text/plain
    text/xml;