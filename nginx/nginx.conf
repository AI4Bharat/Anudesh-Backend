user  nginx;

# Use one worker per CPU core. With 8 vCPUs this gives 8 workers.
# The base Alpine nginx image defaults to worker_processes 1 — this single
# change is the most impactful fix for a multi-core VM.
worker_processes  auto;

# Each worker can open this many file descriptors.
# Must be >= worker_processes * worker_connections.
worker_rlimit_nofile  65535;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    # 4096 connections per worker × 8 workers = 32 768 simultaneous connections.
    worker_connections  4096;

    # Use the most efficient I/O multiplexer available on Linux.
    use  epoll;

    # Accept as many connections as possible per epoll wake-up instead of
    # one at a time, which reduces latency under burst traffic.
    multi_accept  on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Extended log format — includes upstream timing so you can see exactly
    # how long Gunicorn (and the LLM API behind it) is taking.
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" '
                      'rt=$request_time '
                      'uct=$upstream_connect_time '
                      'uht=$upstream_header_time '
                      'urt=$upstream_response_time';

    access_log  /var/log/nginx/access.log  main;

    # Zero-copy file transfers for static assets.
    sendfile    on;
    # Batch TCP packets — sends full packets, reducing the number of
    # syscalls. Works together with sendfile.
    tcp_nopush  on;
    # Disable Nagle for API responses so small chunks aren't delayed.
    tcp_nodelay on;

    # Keep upstream (client-facing) connections open for 75 s.
    keepalive_timeout   75s;
    # Allow up to 1000 requests per kept-alive connection before recycling.
    keepalive_requests  1000;

    # LLM chat submissions can be large (conversation history + prompt).
    client_max_body_size     50m;
    client_body_buffer_size  256k;

    # Cache open-file metadata to avoid repeated stat() calls for static files.
    open_file_cache           max=10000 inactive=30s;
    open_file_cache_valid     60s;
    open_file_cache_min_uses  2;
    open_file_cache_errors    on;

    include /etc/nginx/conf.d/*.conf;
}
