# ---------------------------------------------------------------------------
# proxy-llm.conf
#
# Include this file inside any location block that proxies to an LLM endpoint
# (e.g. InstructionDrivenChat annotation, chat-response API).
#
# Usage in your vhosts/<domain>.conf:
#
#   location ~ ^/(tasks|projects)/[0-9]+/(get_chat_response|llm_response) {
#       proxy_pass http://web_backend;
#       include /etc/nginx/includes/proxy-llm.conf;
#   }
# ---------------------------------------------------------------------------

# LLM calls (OpenAI / Llama / Sarvam / DeepInfra) can take 30-180 s.
# Override the server-level 300 s defaults only if you need a different limit.
proxy_read_timeout    300s;
proxy_send_timeout    300s;

# Increase the body buffer so large conversation-history payloads
# (multiple previous turns) are buffered in memory, not spilled to disk.
client_body_buffer_size  512k;

# Buffer the full LLM JSON response in nginx so the Gunicorn worker is
# released as soon as it finishes writing — not when the client drains it.
# With proxy_buffering on (inherited from server block), these sizes handle
# a 2 048-token response (~8-12 kB) comfortably.
proxy_buffer_size     32k;
proxy_buffers         16 32k;
proxy_busy_buffers_size 64k;

# Do NOT gzip LLM responses inline — the JSON payload is already small
# relative to the time cost, and gzip here wastes CPU that Gunicorn needs.
gzip off;
